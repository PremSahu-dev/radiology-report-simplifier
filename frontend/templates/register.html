<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | MediScan AI</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../static/css/register.css">

</head>

<body>

<div class="container-fluid register-page">

<div class="row min-vh-100">

<!-- ================= LEFT PANEL ================= -->

<div class="col-lg-6 left-panel">

<div class="overlay"></div>

<div class="left-content">

<img src="../static/images/logo.png" class="register-logo" alt="Logo">

<h1>Create Your Account</h1>

<p>

Join MediScan AI and experience AI-powered
radiology report simplification.

</p>

<img src="../static/images/register-hero.png"
class="img-fluid register-image"
alt="Register">

</div>

</div>

<!-- ================= RIGHT PANEL ================= -->

<div class="col-lg-6 d-flex justify-content-center align-items-center">

<div class="register-card">

<h2>Create Account</h2>

<p class="text-muted mb-4">

Fill in your details to get started.

</p>

<form id="registerForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Full Name</label>

<input type="text"
class="form-control"
placeholder="Enter Name"
required>

</div>

<div class="col-md-6 mb-3">

<label>Mobile Number</label>

<input type="tel"
class="form-control"
placeholder="9876543210"
required>

</div>

</div>

<div class="mb-3">

<label>Email Address</label>

<input type="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Hospital Name</label>

<input type="text"
class="form-control"
placeholder="Optional">

</div>


<!-- part - 2 -->

<!-- Password -->

<div class="row">

    <div class="col-md-6 mb-3">

        <label>Password</label>

        <div class="password-box">

            <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Enter Password"
                required>

            <i class="fa-solid fa-eye toggle-password"
                id="togglePassword"></i>

        </div>

    </div>

    <div class="col-md-6 mb-3">

        <label>Confirm Password</label>

        <div class="password-box">

            <input
                type="password"
                id="confirmPassword"
                class="form-control"
                placeholder="Confirm Password"
                required>

            <i class="fa-solid fa-eye toggle-confirm"
                id="toggleConfirm"></i>

        </div>

    </div>

</div>

<!-- Terms -->

<div class="form-check mb-4">

    <input
        class="form-check-input"
        type="checkbox"
        id="terms"
        required>

    <label class="form-check-label" for="terms">

        I agree to the
        <a href="#">Terms & Conditions</a>

    </label>

</div>

<!-- Register Button -->

<button
    type="submit"
    class="btn btn-primary w-100">

    <i class="fa-solid fa-user-plus me-2"></i>

    Create Account

</button>

</form>

<hr class="my-4">

<p class="text-center">

    Already have an account?

   <a href="login.html">

        Login

    </a>

</p>

<div class="text-center mt-3">

    <a href="index.html"
        class="back-home">

        <i class="fa-solid fa-arrow-left me-2"></i>

        Back to Home

    </a>

</div>

</div>

</div>

</div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Register JS -->

<script src="../static/js/register.js"></script>

</body>

</html>
