<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediScan AI</title>
    <!-- Bootstrap -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
        <!-- <link rel="stylesheet" href="../static/css/theme.css"> -->
    <!-- CSS -->
    <!-- <link rel="stylesheet" href="{% static 'css/login.css' %}"> -->
     <link rel="stylesheet" href="../static/css/login.css">
   
</head>
<body>
<div class="container-fluid login-page">
    <div class="row vh-100">
        <!-- Left Side -->
        <div class="col-lg-6 left-panel">
            <div class="overlay"></div>
            <div class="left-content">
                <img src="../static/images/logo.png" class="login-logo">
                <h1>Welcome to <br> MediScan AI</h1>
                <p>
                    AI Powered Radiology Report Simplifier
                </p>
                <img src="../static/images/login-hero.png" class="img-fluid login-image">
            </div>
        </div>
        <!-- Right Side -->
        <div class="col-lg-6 d-flex justify-content-center align-items-center">
            <div class="login-card">
                <h2>Login</h2>
                <p class="text-muted mb-4">
                    Login to continue
                </p>
                <form method="post">
                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="email"
                               class="form-control"
                               placeholder="Enter Email">
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <div class="password-box">
                            <input
                                type="password"
                                class="form-control"
                                id="password"
                                placeholder="Enter Password">
                            <i class="fa-solid fa-eye toggle-password"
                               id="togglePassword"></i>
                        </div>
                    </div>
                    <!-- changing part -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="form-check">
        <input
            class="form-check-input"
            type="checkbox"
            id="remember">
        <label
            class="form-check-label"
            for="remember">
            Remember Me
        </label>
    </div>
    <!-- <a href="forgot.hmtl">Forgot Password?</a> -->
    <p class="text-center">
                    
                    <a href="forgot.html">
                      Forgot Password?
                    </a>
                </p>
   
</div>
 
                    
 <!-- changing part -->
    <!-- <button type="submit" class="btn btn-primary w-100 login-btn">
    <span class="btn-text">
        Login
    </span>
    <span class="spinner-border spinner-border-sm d-none loading-spinner"></span>
</button> -->
<button type="submit" class="btn btn-primary w-100">
    Login
</button>
 <!-- changing part ending -->
                   
                </form>
                <hr>
                <p class="text-center">
                    Don't have an account?
                    <a href="register.html">
                        Register
                    </a>
                </p>
                <a href="index.html"
                   class="back-home">
                    ← Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
<script src="../static/js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

  <!-- baad me changing part -->
   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../static/js/login.js"></script>
</body>
</html>
